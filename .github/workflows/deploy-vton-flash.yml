name: Deploy VTON Flash v14 Patch

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vton-flash-v14-patch-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Flash VTON endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: flash-app
    env:
      RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: flash-app/requirements.txt

      - name: Verify RunPod secret
        shell: bash
        run: |
          if [ -z "${RUNPOD_API_KEY:-}" ]; then
            echo "RUNPOD_API_KEY GitHub Actions secret is missing." >&2
            exit 1
          fi

      - name: Install RunPod Flash
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Validate Flash application
        shell: bash
        run: |
          python - <<'PY'
          import inspect
          from runpod_flash import Endpoint
          import vton_engine
          import vton_worker

          signature = inspect.signature(Endpoint)
          print("RunPod Flash Endpoint signature:", signature)
          print("Flash modules loaded successfully")
          PY

      - name: Build and verify Flash archive
        shell: bash
        run: |
          set -o pipefail
          rm -rf .flash
          flash build --python-version 3.12 2>&1 | tee build.log
          python - <<'PY'
          from pathlib import Path
          artifact = Path(".flash/artifact.tar.gz")
          size_mb = artifact.stat().st_size / 1024 / 1024
          print(f"Flash artifact: {size_mb:.1f} MB")
          if size_mb >= 1500:
              raise SystemExit("Flash artifact still exceeds RunPod 1500 MB limit")
          PY

      - name: Deploy production endpoint
        shell: bash
        run: |
          set -o pipefail
          rm -rf .flash
          flash deploy --app sokak-vitrini-prova-v13 --env production --python-version 3.12 2>&1 | tee deploy.log

      - name: Show deployed environment
        if: always()
        shell: bash
        run: |
          flash env get production --app sokak-vitrini-prova-v13 2>&1 | tee environment.log || true

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "## RunPod Flash VTON v14 in-place patch deployment"
            echo
            echo "Endpoint ID and URL are printed in the deploy logs above."
            echo
            echo '```text'
            tail -n 80 deploy.log 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
