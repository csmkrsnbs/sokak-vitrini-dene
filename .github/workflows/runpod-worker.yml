name: RunPod worker image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "runpod-worker/**"
      - ".github/workflows/runpod-worker.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Docker Buildx hazırla
        uses: docker/setup-buildx-action@v3

      - name: GitHub Container Registry girişi
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Worker imajını oluştur ve gönder
        uses: docker/build-push-action@v6
        with:
          context: ./runpod-worker
          file: ./runpod-worker/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}-flux-worker:latest
            ghcr.io/${{ github.repository }}-flux-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
