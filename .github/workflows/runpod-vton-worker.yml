name: RunPod VTON worker image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "runpod-vton-worker/**"
      - ".github/workflows/runpod-vton-worker.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Runner disk alanını temizle
        shell: bash
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune --all --force || true
          df -h /

      - name: Docker Buildx hazırla
        uses: docker/setup-buildx-action@v3

      - name: GitHub Container Registry girişi
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: VTON imajını oluştur ve gönder
        uses: docker/build-push-action@v6
        with:
          context: ./runpod-vton-worker
          file: ./runpod-vton-worker/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}-vton-worker:latest
            ghcr.io/${{ github.repository }}-vton-worker:${{ github.sha }}
